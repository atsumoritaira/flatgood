<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせありがとうございます | flatgood</title>
    <meta name="description" content="お問い合わせを受け付けました。担当者より1営業日以内にご連絡します。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .thankyou-section {
            min-height: calc(100vh - 64px - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f5ff 0%, #ffffff 100%);
            padding: 80px 2rem;
        }

        .thankyou-card {
            background: #fff;
            border-radius: 16px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 102, 204, 0.08);
            border: 1px solid #e5e5e5;
        }

        .thankyou-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0066cc, #0052a3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: pop 0.5s ease-out;
        }

        .thankyou-icon svg {
            width: 40px;
            height: 40px;
            stroke: #fff;
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .thankyou-card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }

        .thankyou-card .lead {
            font-size: 1.05rem;
            color: #666666;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .thankyou-divider {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 2rem 0;
        }

        .thankyou-info {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .thankyou-info p {
            font-size: 0.95rem;
            color: #666666;
            line-height: 1.8;
            margin: 0;
        }

        .thankyou-info strong {
            color: #1a1a1a;
        }

        .thankyou-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-block;
            padding: 14px 36px;
            background-color: #0066cc;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 2px solid #0066cc;
        }

        .btn-primary:hover {
            background-color: #0052a3;
            border-color: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,102,204,0.2);
        }

        .btn-secondary {
            display: inline-block;
            padding: 14px 36px;
            background-color: #ffffff;
            color: #0066cc;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 2px solid #0066cc;
        }

        .btn-secondary:hover {
            background-color: #f0f5ff;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .thankyou-card {
                padding: 2.5rem 1.5rem;
            }
            .thankyou-card h1 {
                font-size: 1.4rem;
            }
            .thankyou-actions {
                flex-direction: column;
            }
            .btn-primary, .btn-secondary {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="header"></header>

    <section class="thankyou-section">
        <div class="thankyou-card">
            <div class="thankyou-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1>お問い合わせありがとうございます</h1>
            <p class="lead">
                内容を受け付けました。<br>
                担当者より内容を確認の上、ご連絡いたします。
            </p>

            <hr class="thankyou-divider">

            <div class="thankyou-info">
                <p>
                    <strong>返信について</strong><br>
                    通常、<strong>1営業日以内</strong>にご登録のメールアドレスへご返信します。<br>
                    返信がない場合は、迷惑メールフォルダもご確認ください。
                </p>
            </div>

            <div class="thankyou-actions">
                <a href="../index.html" class="btn-primary">トップページへ戻る</a>
                <a href="https://hubs.ly/Q04679Tb0" target="_blank" class="btn-secondary">無料資料を見る</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 flatgood. All rights reserved.</p></div>
    </footer>
    <script src="../nav.js"></script>
</body>
</html>
